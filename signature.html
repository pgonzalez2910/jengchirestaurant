<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sign Document — Jeng Chi Restaurant</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
<style>body{font-family:sans-serif;max-width:500px;margin:0 auto;padding:20px;background:#f5f5f5}
.card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 4px 20px rgba(0,0,0,.1)}
h2{color:#1a2744;margin:0 0 4px}canvas{width:100%;height:150px;border:2px solid #1a2744;border-radius:8px;background:#fff;touch-action:none}
button{width:100%;padding:14px;background:#1a2744;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer;margin-top:12px}</style>
</head><body>
<div class="card" id="main">
  <h2>Employee Signature</h2>
  <p id="subtitle" style="color:#666;font-size:13px">Loading document...</p>
  <div id="doc-info" style="background:#f8f9fc;border-radius:8px;padding:12px;margin:12px 0;display:none">
    <div style="font-weight:700;color:#1a2744" id="emp-name-display"></div>
    <div style="font-size:12px;color:#666;margin-top:4px" id="action-display"></div>
  </div>
  <div id="sign-area" style="display:none">
    <p style="font-size:12px;color:#444;margin:12px 0">By signing below, I acknowledge receipt of this Corrective Action Notice. My signature does not necessarily indicate agreement.</p>
    <canvas id="sig-canvas"></canvas>
    <button onclick="clearPad()">Clear Signature</button>
    <button onclick="submitSig()" style="background:#059669;margin-top:8px">Submit My Signature</button>
  </div>
  <div id="done-area" style="display:none;text-align:center;padding:20px">
    <div style="font-size:48px">✅</div>
    <h3 style="color:#059669">Signature Submitted</h3>
    <p style="color:#666;font-size:13px">Your signature has been recorded. You may close this page.</p>
  </div>
  <div id="error-area" style="display:none;text-align:center;padding:20px;color:#dc2626"></div>
</div>
<script>
const SUPABASE_URL = 'https://kpldzwlftkvjjntgsqxx.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtwbGR6d2xmdGt2ampudGdzcXh4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDY2MzE5NzAsImV4cCI6MjA2MjIwNzk3MH0.qnWbOQv2RLPsIyO-oRwQkAN2VhmmdhTBt46SweUsLbs';
// Support UMD global: window.supabase.createClient
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const token = new URLSearchParams(window.location.search).get('t');
let pad, record;
async function init() {
  if (!token) { showError('Invalid link.'); return; }
  const { data, error } = await sb.from('disciplinary_actions').select('*').eq('emp_sign_token', token).single();
  if (error || !data) { showError('Document not found or link expired.'); return; }
  if (data.emp_sig_img) { document.getElementById('done-area').style.display='block'; document.getElementById('subtitle').textContent='Already signed.'; return; }
  record = data;
  document.getElementById('emp-name-display').textContent = data.employee_name || '—';
  document.getElementById('action-display').textContent = (data.action_type||'').replace(/_/g,' ') + ' · ' + (data.incident_date||'') + ' · Ref: ' + (data.reference||'—');
  document.getElementById('doc-info').style.display='block';
  document.getElementById('sign-area').style.display='block';
  document.getElementById('subtitle').textContent = 'Please sign to acknowledge receipt.';
  const canvas = document.getElementById('sig-canvas');
  const ratio = window.devicePixelRatio||1;
  canvas.width = canvas.offsetWidth * ratio; canvas.height = 150 * ratio;
  canvas.getContext('2d').scale(ratio, ratio);
  pad = new SignaturePad(canvas, {backgroundColor:'rgb(255,255,255)',penColor:'#1a2744'});
}
function clearPad() { pad.clear(); }
async function submitSig() {
  if (!pad || pad.isEmpty()) { alert('Please sign before submitting.'); return; }
  const sigImg = pad.toDataURL('image/png');
  const signedAt = new Date().toISOString();
  const { error } = await sb.from('disciplinary_actions').update({ emp_sig_img: sigImg, emp_signed_at: signedAt, status: 'acknowledged' }).eq('id', record.id);
  if (error) { showError('Error saving signature: ' + error.message); return; }
  document.getElementById('sign-area').style.display='none';
  document.getElementById('done-area').style.display='block';
}
function showError(msg) { const e = document.getElementById('error-area'); e.innerHTML = '⚠️ ' + msg; e.style.display='block'; }
init();
</script></body></html>
