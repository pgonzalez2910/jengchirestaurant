<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jeng Chi Restaurant | Admin Login</title>
  <style>
    :root {
      --brand: #4a1212;
      --brand-2: #7f1d1d;
      --gold: #c59d5f;
      --ink: #172033;
      --muted: #667085;
      --line: #d9dee8;
      --soft: #f8fafc;
      --white: #ffffff;
      --danger: #b42318;
      --success: #067647;
      --shadow: 0 24px 60px rgba(16, 24, 40, 0.14);
      --radius: 22px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(197, 157, 95, .18), transparent 34rem),
        linear-gradient(135deg, #f7f4ef 0%, #f8fafc 45%, #eef2f7 100%);
      color: var(--ink);
    }

    .page {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 30px 0 60px;
    }

    .brand {
      display: flex;
      justify-content: center;
      margin-bottom: 24px;
    }

    .brand img {
      width: min(360px, 80vw);
      height: auto;
      display: block;
    }

    .login-card,
    .dashboard-card {
      background: rgba(255, 255, 255, .97);
      border: 1px solid rgba(217, 222, 232, .95);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .login-card {
      width: min(520px, 100%);
      margin: 0 auto;
      padding: 34px;
    }

    h1 {
      margin: 0;
      color: var(--brand);
      letter-spacing: -.03em;
      font-size: 34px;
      line-height: 1.1;
    }

    .subtitle {
      margin: 10px 0 24px;
      color: var(--muted);
      line-height: 1.5;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 800;
      color: #344054;
      margin-bottom: 7px;
    }

    input {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 14px;
      padding: 13px 14px;
      min-height: 46px;
      font: 15px Arial, Helvetica, sans-serif;
      outline: none;
      margin-bottom: 16px;
      color: var(--ink);
    }

    input:focus {
      border-color: var(--brand-2);
      box-shadow: 0 0 0 4px rgba(127, 29, 29, .10);
    }

    button {
      border: 0;
      border-radius: 14px;
      padding: 13px 18px;
      min-height: 46px;
      cursor: pointer;
      font-weight: 800;
      font-size: 15px;
      transition: transform .15s ease, box-shadow .15s ease, background .15s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: .55;
      cursor: not-allowed;
      transform: none;
    }

    .primary {
      width: 100%;
      background: var(--brand);
      color: #fff;
      box-shadow: 0 12px 24px rgba(74, 18, 18, .16);
    }

    .secondary {
      background: #fff;
      color: var(--brand);
      border: 1px solid var(--line);
    }

    .status {
      display: none;
      margin-top: 14px;
      border-radius: 14px;
      padding: 13px 14px;
      font-weight: 800;
      font-size: 14px;
    }

    .status.error {
      display: block;
      background: #fef3f2;
      border: 1px solid #fecdca;
      color: var(--danger);
    }

    .status.success {
      display: block;
      background: #ecfdf3;
      border: 1px solid #abefc6;
      color: var(--success);
    }

    .hide {
      display: none !important;
    }

    .dashboard-card {
      display: none;
    }

    .dash-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 26px 30px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }

    .dash-header h1 {
      font-size: 30px;
    }

    .admin-meta {
      margin-top: 6px;
      color: var(--muted);
      font-size: 14px;
    }

    .dash-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 14px;
      padding: 22px 30px;
      background: #fcfcfd;
      border-bottom: 1px solid var(--line);
    }

    .summary-card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
    }

    .summary-card strong {
      display: block;
      color: var(--brand);
      font-size: 28px;
      line-height: 1;
      margin-bottom: 8px;
    }

    .summary-card span {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .table-section {
      padding: 24px 30px 30px;
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: end;
      margin-bottom: 14px;
    }

    .section-title h2 {
      margin: 0;
      color: var(--brand);
      font-size: 22px;
    }

    .small {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #fff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1080px;
    }

    th,
    td {
      padding: 14px 16px;
      border-bottom: 1px solid #edf0f5;
      text-align: left;
      vertical-align: top;
      font-size: 14px;
    }

    th {
      background: #f8fafc;
      color: var(--brand);
      text-transform: uppercase;
      letter-spacing: .04em;
      font-size: 12px;
      font-weight: 900;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .applicant-name {
      font-weight: 900;
      color: #101828;
    }

    .muted {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .pill {
      display: inline-block;
      border-radius: 999px;
      padding: 6px 10px;
      font-weight: 900;
      font-size: 12px;
      border: 1px solid #fedf89;
      background: #fffbeb;
      color: #92400e;
    }

    .pill.green {
      border-color: #abefc6;
      background: #ecfdf3;
      color: #067647;
    }

    .pill.gray {
      border-color: #d0d5dd;
      background: #f8fafc;
      color: #344054;
    }

    .pdf-link {
      display: inline-block;
      text-decoration: none;
      color: var(--brand);
      border: 1px solid var(--gold);
      border-radius: 12px;
      padding: 9px 12px;
      font-weight: 900;
      background: #fffaf2;
      white-space: nowrap;
    }

    .no-pdf {
      display: inline-block;
      color: #b54708;
      border: 1px solid #fedf89;
      background: #fffbeb;
      border-radius: 12px;
      padding: 9px 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    @media (max-width: 900px) {
      .dash-header {
        flex-direction: column;
        align-items: stretch;
      }

      .dash-actions {
        flex-direction: column;
        align-items: stretch;
      }

      .summary-grid {
        grid-template-columns: 1fr 1fr;
      }

      .login-card {
        padding: 24px;
      }
    }

    @media (max-width: 520px) {
      .summary-grid {
        grid-template-columns: 1fr;
      }

      .table-section,
      .dash-header,
      .summary-grid {
        padding-left: 18px;
        padding-right: 18px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="brand">
      <img src="https://raw.githubusercontent.com/pgonzalez2910/jengchi-product-images/main/jengchilogo.jpg" alt="Jeng Chi Restaurant">
    </div>

    <section id="loginCard" class="login-card">
      <h1>Admin Login</h1>
      <p class="subtitle">Jeng Chi Restaurant employment application dashboard.</p>

      <form id="loginForm">
        <label for="username">Username</label>
        <input id="username" type="text" autocomplete="username" required placeholder="PG9367" />

        <label for="pin">PIN</label>
        <input id="pin" type="password" inputmode="numeric" autocomplete="current-password" required placeholder="Enter PIN" />

        <button id="loginButton" class="primary" type="submit">Sign In</button>
      </form>

      <div id="loginStatus" class="status"></div>
    </section>

    <section id="dashboardCard" class="dashboard-card">
      <header class="dash-header">
        <div>
          <h1>Job Application Dashboard</h1>
          <div id="adminMeta" class="admin-meta"></div>
        </div>
        <div class="dash-actions">
          <button class="secondary" type="button" onclick="loadDashboardData()">Refresh</button>
          <button class="secondary" type="button" onclick="logout()">Logout</button>
        </div>
      </header>

      <div class="summary-grid">
        <div class="summary-card">
          <strong id="totalApplications">0</strong>
          <span>Total Applications</span>
        </div>
        <div class="summary-card">
          <strong id="totalVisits">0</strong>
          <span>Total Visits</span>
        </div>
        <div class="summary-card">
          <strong id="submittedVisits">0</strong>
          <span>Submitted Visits</span>
        </div>
        <div class="summary-card">
          <strong id="englishApplications">0</strong>
          <span>English</span>
        </div>
        <div class="summary-card">
          <strong id="spanishApplications">0</strong>
          <span>Spanish</span>
        </div>
      </div>

      <section class="table-section">
        <div class="section-title">
          <div>
            <h2>Submitted Applications</h2>
            <div id="recordsShown" class="small">0 records shown</div>
          </div>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Date</th>
                <th>Applicant</th>
                <th>Position</th>
                <th>Language</th>
                <th>Contact</th>
                <th>Location</th>
                <th>PDF</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="applicationsBody">
              <tr>
                <td colspan="8">No records loaded.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </section>
  </main>

  <script>
    const SUPABASE_URL = "https://kpldzwlftkvjjntgsqxx.supabase.co";

    let sessionToken = localStorage.getItem("jengchi_admin_session_token") || "";
    let adminInfo = null;

    function showLoginStatus(kind, message) {
      const status = document.getElementById("loginStatus");
      status.className = "status " + kind;
      status.textContent = message;
    }

    function formatDate(value) {
      if (!value) return "—";
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return value;
      return d.toLocaleString("en-US", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function clean(value) {
      return value === null || value === undefined || value === "" ? "—" : String(value);
    }

    function getApplicantName(app) {
      return clean(app.legal_full_name || app.full_legal_name);
    }

    function getLanguage(app) {
      const lang = String(app.language || app.preferred_language || "").toLowerCase();
      if (lang === "es") return "Spanish";
      if (lang === "en") return "English";
      return "—";
    }

    function getPdfCell(app) {
      if (app.pdf_url) {
        return `<a class="pdf-link" href="${app.pdf_url}" target="_blank" rel="noopener">Open PDF</a>
                <div class="muted">${clean(app.pdf_email_status)}</div>`;
      }

      return `<span class="no-pdf">No PDF</span>`;
    }

    function renderApplications(applications) {
      const tbody = document.getElementById("applicationsBody");
      document.getElementById("recordsShown").textContent = `${applications.length} records shown`;

      if (!applications.length) {
        tbody.innerHTML = `<tr><td colspan="8">No applications found.</td></tr>`;
        return;
      }

      tbody.innerHTML = applications.map(app => {
        const city = clean(app.city);
        const state = clean(app.state);
        const zip = clean(app.zip_code);

        return `
          <tr>
            <td>
              <strong>${formatDate(app.created_at)}</strong>
              <div class="muted">Application: ${clean(app.application_date)}</div>
            </td>
            <td>
              <div class="applicant-name">${getApplicantName(app)}</div>
              <div class="muted">ID: ${clean(app.id)}</div>
            </td>
            <td>
              <span class="pill">${clean(app.position_applied)}</span>
              <div class="muted">Available: ${clean(app.available_start_date || app.available_date)}</div>
            </td>
            <td>
              <span class="pill gray">${getLanguage(app)}</span>
            </td>
            <td>
              ${clean(app.phone)}
              <div class="muted">${clean(app.email)}</div>
            </td>
            <td>
              ${city},<br>${state}
              <div class="muted">ZIP: ${zip}</div>
            </td>
            <td>${getPdfCell(app)}</td>
            <td>
              <span class="pill green">${clean(app.status || "new")}</span>
            </td>
          </tr>
        `;
      }).join("");
    }

    async function login(username, pin) {
      const response = await fetch(`${SUPABASE_URL}/functions/v1/admin-login`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ username, pin })
      });

      const data = await response.json().catch(() => ({}));

      if (!response.ok || data.ok !== true) {
        throw new Error(data.error || "Login failed.");
      }

      sessionToken = data.session_token;
      adminInfo = data.admin;
      localStorage.setItem("jengchi_admin_session_token", sessionToken);
      localStorage.setItem("jengchi_admin_info", JSON.stringify(adminInfo));

      return data;
    }

    async function loadDashboardData() {
      if (!sessionToken) return;

      const response = await fetch(`${SUPABASE_URL}/functions/v1/admin-dashboard-data`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          session_token: sessionToken,
          limit: 250
        })
      });

      const data = await response.json().catch(() => ({}));

      if (!response.ok || data.ok !== true) {
        throw new Error(data.error || "Could not load applications.");
      }

      document.getElementById("loginCard").style.display = "none";
      document.getElementById("dashboardCard").style.display = "block";

      adminInfo = data.admin || adminInfo;

      document.getElementById("adminMeta").textContent =
        `${clean(adminInfo?.full_name)} • ${clean(adminInfo?.username)} • ${clean(adminInfo?.role)}`;

      document.getElementById("totalApplications").textContent = clean(data.summary?.total_applications || 0);
      document.getElementById("totalVisits").textContent = clean(data.summary?.total_visits || 0);
      document.getElementById("submittedVisits").textContent = clean(data.summary?.submitted_visits || 0);
      document.getElementById("englishApplications").textContent = clean(data.summary?.english_applications || 0);
      document.getElementById("spanishApplications").textContent = clean(data.summary?.spanish_applications || 0);

      renderApplications(data.applications || []);
    }

    function logout() {
      localStorage.removeItem("jengchi_admin_session_token");
      localStorage.removeItem("jengchi_admin_info");
      sessionToken = "";
      adminInfo = null;
      document.getElementById("dashboardCard").style.display = "none";
      document.getElementById("loginCard").style.display = "block";
      showLoginStatus("success", "Logged out.");
    }

    document.getElementById("loginForm").addEventListener("submit", async (event) => {
      event.preventDefault();

      const button = document.getElementById("loginButton");
      const username = document.getElementById("username").value.trim();
      const pin = document.getElementById("pin").value.trim();

      button.disabled = true;
      button.textContent = "Signing in...";

      try {
        await login(username, pin);
        await loadDashboardData();
      } catch (error) {
        console.error(error);
        showLoginStatus("error", error.message || String(error));
      } finally {
        button.disabled = false;
        button.textContent = "Sign In";
      }
    });

    document.addEventListener("DOMContentLoaded", async () => {
      if (sessionToken) {
        try {
          adminInfo = JSON.parse(localStorage.getItem("jengchi_admin_info") || "null");
          await loadDashboardData();
        } catch {
          logout();
        }
      }
    });
  </script>
</body>
</html>
