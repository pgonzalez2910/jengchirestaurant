<!-- bakery.html -->
<script>
  function sortItemsAlphabetically(a, b) {
    return String(a.name || "").localeCompare(String(b.name || ""), undefined, {
      numeric: true,
      sensitivity: "base"
    });
  }

  function groupItemsByCategory() {
    const grouped = {};

    getAllCategoryOptions().forEach(category => {
      grouped[category] = [];
    });

    bakeryItems.forEach(item => {
      const category = getItemDisplayCategory(item);

      if (!grouped[category]) {
        grouped[category] = [];
      }

      grouped[category].push(item);
    });

    Object.keys(grouped).forEach(category => {
      grouped[category].sort(sortItemsAlphabetically);
    });

    return grouped;
  }
</script>
