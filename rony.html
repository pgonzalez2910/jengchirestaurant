<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rony — Place Order | Jeng Chi</title>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'IBM Plex Sans', sans-serif;
            background: #f7f2f2;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .loader {
            text-align: center;
            color: #573636;
        }
        .loader h2 {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        .loader p {
            font-size: 0.85rem;
            color: #8a6060;
        }
        .spinner {
            width: 36px;
            height: 36px;
            border: 4px solid #d0b4b4;
            border-top-color: #c48a00;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <h2>Loading Rony's Orders…</h2>
        <p>Redirecting to Place Order</p>
    </div>
    <script>
        // Redirect immediately to inventory2026 with ?user=rony
        window.location.replace('inventory2026.html?user=rony');
    </script>
</body>
</html>
