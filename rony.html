    <title>Rony — Place Order | Jeng Chi</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'IBM Plex Sans', sans-serif;
            background: #f7f2f2;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh;

        .loader { text-align: center; color: #573636; }
        .loader h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 0.4rem; }
        .loader p  { font-size: 0.85rem; color: #8a6060; }
        .spinner {
            width: 38px; height: 38px;
            border: 4px solid #d0b4b4; border-top-color: #c48a00;
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>

        <div class="spinner"></div>
