<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Inventory2026 | PAR Management</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --bg:#f4f7f9;
  --card:#ffffff;
  --border:#d9dee7;
  --text:#111827;
  --muted:#64748b;
  --dark:#0c1e35;
  --blue:#1e5799;
  --accent:#2dd4bf;
  --saving:#fff7cc;
  --saved:#dcfce7;
  --error:#fee2e2;
  --rony:#1e5799;
  --julio:#15803d;
  --office:#7c3aed;
  --other:#64748b;
  --shadow:0 14px 35px rgba(15,23,42,.08);
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family:Arial,Helvetica,sans-serif;
  background:var(--bg);
  color:var(--text);
}

.app{
  padding:20px;
}

/* HEADER */

.header{
  background:white;
  border:1px solid var(--border);
  border-bottom:4px solid var(--accent);
  border-radius:18px;
  box-shadow:var(--shadow);
  padding:22px 26px;
  margin-bottom:18px;
}

.header-main{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:20px;
  flex-wrap:wrap;
}

.brand{
  display:flex;
  align-items:center;
  gap:18px;
}

.logo{
  width:120px;
  height:82px;
  object-fit:contain;
}

h1{
  font-size:28px;
  color:var(--dark);
  margin-bottom:6px;
}

.subtitle{
  font-size:13px;
  color:var(--muted);
  font-weight:700;
}

.status-pill{
  padding:10px 18px;
  border-radius:999px;
  border:1px solid var(--border);
  font-size:13px;
  font-weight:800;
  background:#f8fafc;
}

.toolbar{
  margin-top:22px;
  display:grid;
  grid-template-columns:1.4fr 1fr 1fr auto auto;
  gap:12px;
}

input,
select{
  width:100%;
  padding:12px 14px;
  border:1px solid var(--border);
  border-radius:10px;
  background:white;
  font-size:14px;
}

input:focus,
select:focus{
  outline:none;
  border-color:var(--blue);
  box-shadow:0 0 0 4px rgba(30,87,153,.12);
}

button{
  border:0;
  border-radius:10px;
  padding:12px 18px;
  font-weight:800;
  cursor:pointer;
  color:white;
  background:var(--dark);
}

button.blue{
  background:var(--blue);
}

/* SUMMARY */

.summary{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:12px;
  margin-bottom:18px;
}

.summary-card{
  background:white;
  border:1px solid var(--border);
  border-radius:14px;
  box-shadow:var(--shadow);
  padding:18px;
}

.summary-card label{
  display:block;
  font-size:11px;
  color:var(--muted);
  text-transform:uppercase;
  font-weight:900;
  margin-bottom:6px;
}

.summary-card strong{
  font-size:24px;
  color:var(--dark);
}

/* BIG CATEGORY BAR */

.big-category-bar{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:14px;
  margin-bottom:18px;
}

.big-category-card{
  background:white;
  border:1px solid var(--border);
  border-radius:18px;
  box-shadow:var(--shadow);
  padding:18px;
  cursor:pointer;
  transition:.2s;
  border-left:7px solid var(--other);
}

.big-category-card:hover{
  transform:translateY(-2px);
}

.big-category-card.active{
  outline:3px solid rgba(30,87,153,.18);
}

.big-category-card.rony{
  border-left-color:var(--rony);
}

.big-category-card.julio{
  border-left-color:var(--julio);
}

.big-category-card.office{
  border-left-color:var(--office);
}

.big-category-card.all{
  border-left-color:var(--dark);
}

.big-title{
  font-size:20px;
  font-weight:900;
  color:var(--dark);
  margin-bottom:6px;
}

.big-count{
  font-size:13px;
  color:var(--muted);
  font-weight:800;
}

/* LAYOUT */

.layout{
  display:grid;
  grid-template-columns:300px 1fr;
  gap:18px;
}

.sidebar{
  background:white;
  border:1px solid var(--border);
  border-radius:18px;
  box-shadow:var(--shadow);
  overflow:hidden;
  height:calc(100vh - 330px);
  position:sticky;
  top:20px;
}

.sidebar-title{
  padding:16px;
  background:var(--dark);
  color:white;
  font-weight:900;
  font-size:13px;
  text-transform:uppercase;
  letter-spacing:.06em;
}

.category-list{
  overflow:auto;
  height:calc(100% - 50px);
}

.category-btn{
  width:100%;
  background:white;
  color:#111827;
  border:0;
  border-bottom:1px solid var(--border);
  border-radius:0;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 16px;
  font-size:13px;
  text-align:left;
  cursor:pointer;
}

.category-btn:hover,
.category-btn.active{
  background:#eaf4ff;
  color:var(--blue);
}

.category-count{
  background:#e2e8f0;
  border-radius:999px;
  padding:4px 9px;
  font-size:11px;
  font-weight:900;
}

.content{
  min-width:0;
}

/* GROUP SECTION */

.assigned-section{
  background:white;
  border:1px solid var(--border);
  border-radius:22px;
  box-shadow:var(--shadow);
  margin-bottom:24px;
  overflow:hidden;
}

.assigned-header{
  padding:22px 24px;
  color:white;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.assigned-header.rony{
  background:linear-gradient(135deg,#0c1e35,#1e5799);
}

.assigned-header.julio{
  background:linear-gradient(135deg,#14532d,#15803d);
}

.assigned-header.office{
  background:linear-gradient(135deg,#4c1d95,#7c3aed);
}

.assigned-header.other{
  background:linear-gradient(135deg,#334155,#64748b);
}

.assigned-title{
  font-size:26px;
  font-weight:900;
  letter-spacing:.02em;
}

.assigned-sub{
  font-size:13px;
  opacity:.9;
  font-weight:800;
}

.category-section{
  margin:16px;
  border:1px solid var(--border);
  border-radius:18px;
  overflow:hidden;
  background:white;
}

.category-header{
  background:#f8fafc;
  border-bottom:1px solid var(--border);
  padding:15px 18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.category-title{
  font-size:18px;
  font-weight:900;
  color:var(--dark);
}

.category-sub{
  font-size:12px;
  color:var(--muted);
  font-weight:800;
}

.product-grid{
  padding:16px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(310px,1fr));
  gap:14px;
}

/* PRODUCT CARD */

.card{
  border:1px solid var(--border);
  border-radius:16px;
  background:white;
  padding:14px;
  transition:.2s;
}

.card.saving{
  background:var(--saving);
}

.card.saved{
  background:var(--saved);
}

.card.error{
  background:var(--error);
}

.product-top{
  display:grid;
  grid-template-columns:92px 1fr;
  gap:14px;
  align-items:center;
  margin-bottom:14px;
}

.product-img{
  width:92px;
  height:92px;
  object-fit:contain;
  border:1px solid var(--border);
  border-radius:14px;
  padding:6px;
  background:white;
}

.product-title{
  font-size:15px;
  font-weight:900;
  line-height:1.3;
}

.assigned-badge{
  display:inline-block;
  margin-top:7px;
  padding:4px 8px;
  border-radius:999px;
  background:#e0f2fe;
  color:#075985;
  font-size:11px;
  font-weight:900;
}

.duplicate-badge{
  display:inline-block;
  margin-top:7px;
  margin-left:6px;
  padding:4px 8px;
  border-radius:999px;
  background:#fef3c7;
  color:#92400e;
  font-size:11px;
  font-weight:900;
}

.card-fields{
  display:grid;
  grid-template-columns:1fr 110px;
  gap:10px;
  margin-bottom:12px;
}

.field-label{
  font-size:10px;
  font-weight:900;
  color:var(--muted);
  text-transform:uppercase;
  margin-bottom:4px;
}

.par-input{
  text-align:center;
  font-weight:900;
}

.vendor-ref{
  border-top:1px solid var(--border);
  padding-top:10px;
  font-size:12px;
  color:#334155;
  font-weight:700;
  line-height:1.45;
}

.row-status{
  margin-top:10px;
  font-size:12px;
  font-weight:900;
  color:#475569;
}

.empty{
  background:white;
  border:1px solid var(--border);
  border-radius:18px;
  padding:40px;
  text-align:center;
  color:var(--muted);
  font-weight:900;
}

@media(max-width:1000px){
  .toolbar{
    grid-template-columns:1fr;
  }

  .summary{
    grid-template-columns:1fr;
  }

  .big-category-bar{
    grid-template-columns:1fr;
  }

  .layout{
    grid-template-columns:1fr;
  }

  .sidebar{
    height:auto;
    position:relative;
  }
}
</style>
</head>

<body>
<div class="app">

<header class="header">
  <div class="header-main">
    <div class="brand">
      <img
        class="logo"
        src="https://raw.githubusercontent.com/pgonzalez2910/jengchi-product-images/main/jengchilogo.jpg"
        alt="Jeng Chi Logo"
        onerror="this.src='https://placehold.co/200x100?text=Jeng+Chi'"
      >

      <div>
        <h1>Inventory2026 — PAR Management</h1>
        <div class="subtitle">
          Big Category Layout · Rony · Julio · Office · Category Control · Autosave · CSV Export
        </div>
      </div>
    </div>

    <div class="status-pill" id="systemStatus">System Ready</div>
  </div>

  <div class="toolbar">
    <input id="searchInput" placeholder="Search product..." />

    <select id="categoryFilter">
      <option value="">All Categories</option>
    </select>

    <select id="vendorFilter">
      <option value="">All Vendors</option>
    </select>

    <button onclick="loadProducts()">Refresh</button>
    <button class="blue" onclick="exportCSV()">Export CSV</button>
  </div>
</header>

<section class="summary">
  <div class="summary-card">
    <label>Total Products Showing</label>
    <strong id="totalProducts">0</strong>
  </div>

  <div class="summary-card">
    <label>Categories</label>
    <strong id="totalCategories">0</strong>
  </div>

  <div class="summary-card">
    <label>Vendors</label>
    <strong id="totalVendors">0</strong>
  </div>

  <div class="summary-card">
    <label>Missing Photos</label>
    <strong id="missingPhotos">0</strong>
  </div>

  <div class="summary-card">
    <label>Duplicates Hidden</label>
    <strong id="duplicatesHidden">0</strong>
  </div>
</section>

<section class="big-category-bar">
  <div class="big-category-card all active" id="big-All" onclick="selectBigCategory('')">
    <div class="big-title">All Products</div>
    <div class="big-count" id="count-All">0 products</div>
  </div>

  <div class="big-category-card rony" id="big-Rony" onclick="selectBigCategory('Rony')">
    <div class="big-title">Rony</div>
    <div class="big-count" id="count-Rony">0 products</div>
  </div>

  <div class="big-category-card julio" id="big-Julio" onclick="selectBigCategory('Julio')">
    <div class="big-title">Julio</div>
    <div class="big-count" id="count-Julio">0 products</div>
  </div>

  <div class="big-category-card office" id="big-Office" onclick="selectBigCategory('Office')">
    <div class="big-title">Office</div>
    <div class="big-count" id="count-Office">0 products</div>
  </div>
</section>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-title">Categories Inside Selected Group</div>
    <div class="category-list" id="categoryList"></div>
  </aside>

  <main class="content" id="productContent">
    <div class="empty">Loading PAR Management...</div>
  </main>
</div>

</div>

<script>
const SUPABASE_URL = "https://kpldzwlftkvjjntgsqxx.supabase.co";

const SUPABASE_ANON_KEY =
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtwbGR6d2xmdGt2ampudGdzcXh4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDY2MzE5NzAsImV4cCI6MjA2MjIwNzk3MH0.qnWbOQv2RLPsIyO-oRwQkAN2VhmmdhTBt46SweUsLbs";

const supabaseClient = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

const INVENTORY_TABLE = "inventory_management";
const INVOICE_ITEMS_TABLE = "invoice_items";
const INVOICES_TABLE = "invoices";

const GITHUB_BASE =
  "https://raw.githubusercontent.com/pgonzalez2910/jengchi-product-images/main/";

let rawProducts = [];
let allProducts = [];
let currentFiltered = [];
let categoryList = [];
let vendorMap = new Map();
let saveTimers = {};
let activeBigCategory = "";
let activeCategory = "";
let duplicatesHiddenCount = 0;

const productContent = document.getElementById("productContent");
const categoryListEl = document.getElementById("categoryList");
const searchInput = document.getElementById("searchInput");
const categoryFilter = document.getElementById("categoryFilter");
const vendorFilter = document.getElementById("vendorFilter");
const systemStatus = document.getElementById("systemStatus");

document.addEventListener("DOMContentLoaded", () => {
  loadProducts();

  searchInput.addEventListener("input", renderProducts);

  categoryFilter.addEventListener("change", () => {
    activeCategory = categoryFilter.value;
    renderProducts();
  });

  vendorFilter.addEventListener("change", renderProducts);
});

async function loadProducts(){
  setSystemStatus("Loading...", "loading");

  const { data, error } = await supabaseClient
    .from(INVENTORY_TABLE)
    .select("id, product_name, image_url, category, par, assigned_to")
    .order("product_name", { ascending:true });

  if(error){
    console.error(error);
    setSystemStatus("Load Error", "error");

    productContent.innerHTML = `
      <div class="empty">
        Error loading inventory data. Check table, columns, Supabase credentials, or RLS.
      </div>
    `;

    return;
  }

  rawProducts = data || [];
  allProducts = mergeDuplicateProducts(rawProducts);
  duplicatesHiddenCount = Math.max(0, rawProducts.length - allProducts.length);

  categoryList = [
    ...new Set(allProducts.map(x => cleanCategory(x.category)))
  ].sort();

  await loadVendorHistory();

  buildFilters();
  renderProducts();

  setSystemStatus("System Ready", "ready");
}

async function loadVendorHistory(){
  vendorMap = new Map();

  const { data: invoiceItems, error:itemError } = await supabaseClient
    .from(INVOICE_ITEMS_TABLE)
    .select("product_name, invoice_id");

  if(itemError){
    console.warn("Vendor history unavailable:", itemError);
    return;
  }

  const invoiceIds = [
    ...new Set(
      (invoiceItems || [])
        .map(x => x.invoice_id)
        .filter(Boolean)
    )
  ];

  if(!invoiceIds.length) return;

  const { data: invoices, error:invoiceError } = await supabaseClient
    .from(INVOICES_TABLE)
    .select("id, vendor")
    .in("id", invoiceIds);

  if(invoiceError){
    console.warn("Invoice vendor lookup unavailable:", invoiceError);
    return;
  }

  const invoiceVendorById = new Map();

  (invoices || []).forEach(inv => {
    if(inv.id && inv.vendor){
      invoiceVendorById.set(inv.id, inv.vendor);
    }
  });

  (invoiceItems || []).forEach(item => {
    const productKey = normalizeProductName(item.product_name);
    const vendor = invoiceVendorById.get(item.invoice_id);

    if(!productKey || !vendor) return;

    if(!vendorMap.has(productKey)){
      vendorMap.set(productKey, new Set());
    }

    vendorMap.get(productKey).add(vendor);
  });
}

function buildFilters(){
  categoryFilter.innerHTML = `<option value="">All Categories</option>`;

  categoryList.forEach(category => {
    categoryFilter.innerHTML += `
      <option value="${escapeHtml(category)}">${escapeHtml(category)}</option>
    `;
  });

  const vendors = [
    ...new Set(
      [...vendorMap.values()]
        .flatMap(set => [...set])
        .filter(Boolean)
    )
  ].sort();

  vendorFilter.innerHTML = `<option value="">All Vendors</option>`;

  vendors.forEach(vendor => {
    vendorFilter.innerHTML += `
      <option value="${escapeHtml(vendor)}">${escapeHtml(vendor)}</option>
    `;
  });

  document.getElementById("totalCategories").textContent = categoryList.length;
  document.getElementById("totalVendors").textContent = vendors.length;
  document.getElementById("duplicatesHidden").textContent = duplicatesHiddenCount;
}

function selectBigCategory(group){
  activeBigCategory = group;
  activeCategory = "";
  categoryFilter.value = "";

  document.querySelectorAll(".big-category-card").forEach(card => {
    card.classList.remove("active");
  });

  const activeId = group || "All";
  const activeCard = document.getElementById(`big-${activeId}`);

  if(activeCard){
    activeCard.classList.add("active");
  }

  renderProducts();
}

function renderProducts(){
  const search = searchInput.value.toLowerCase().trim();
  const selectedVendor = vendorFilter.value;

  currentFiltered = allProducts.filter(item => {
    const name = String(item.product_name || "").toLowerCase();
    const category = cleanCategory(item.category);
    const assignedTo = normalizeAssigned(item.assigned_to);
    const vendors = getVendorsForProduct(item.product_name);

    return (
      (!search || name.includes(search)) &&
      (!activeBigCategory || assignedTo.includes(activeBigCategory)) &&
      (!activeCategory || category === activeCategory) &&
      (!selectedVendor || vendors.includes(selectedVendor))
    );
  });

  document.getElementById("totalProducts").textContent = currentFiltered.length;
  document.getElementById("missingPhotos").textContent =
    currentFiltered.filter(x => !x.image_url).length;
  document.getElementById("duplicatesHidden").textContent = duplicatesHiddenCount;

  renderBigCategoryCounts();
  renderCategorySidebar();
  renderGroupedProducts();
}

function renderBigCategoryCounts(){
  const counts = {
    All: allProducts.length,
    Rony: 0,
    Julio: 0,
    Office: 0
  };

  allProducts.forEach(item => {
    const assigned = normalizeAssigned(item.assigned_to);

    if(assigned.includes("Rony")) counts.Rony++;
    if(assigned.includes("Julio")) counts.Julio++;
    if(assigned.includes("Office")) counts.Office++;
  });

  document.getElementById("count-All").textContent = `${counts.All} products`;
  document.getElementById("count-Rony").textContent = `${counts.Rony} products`;
  document.getElementById("count-Julio").textContent = `${counts.Julio} products`;
  document.getElementById("count-Office").textContent = `${counts.Office} products`;
}

function renderCategorySidebar(){
  const counts = new Map();

  allProducts.forEach(item => {
    const assignedTo = normalizeAssigned(item.assigned_to);
    const name = String(item.product_name || "").toLowerCase();
    const search = searchInput.value.toLowerCase().trim();

    if(activeBigCategory && !assignedTo.includes(activeBigCategory)) return;
    if(search && !name.includes(search)) return;

    const cat = cleanCategory(item.category);
    counts.set(cat, (counts.get(cat) || 0) + 1);
  });

  const total = [...counts.values()].reduce((a,b) => a + b, 0);

  categoryListEl.innerHTML = `
    <button class="category-btn ${activeCategory === "" ? "active" : ""}" onclick="selectCategory('')">
      <span>All Categories</span>
      <span class="category-count">${total}</span>
    </button>
  `;

  [...counts.entries()].sort().forEach(([cat,count]) => {
    categoryListEl.innerHTML += `
      <button class="category-btn ${activeCategory === cat ? "active" : ""}" onclick="selectCategory('${escapeJs(cat)}')">
        <span>${escapeHtml(cat)}</span>
        <span class="category-count">${count}</span>
      </button>
    `;
  });
}

function selectCategory(category){
  activeCategory = category;
  categoryFilter.value = category;
  renderProducts();
}

function renderGroupedProducts(){
  if(!currentFiltered.length){
    productContent.innerHTML = `<div class="empty">No products found.</div>`;
    return;
  }

  const groups = {
    Rony: [],
    Julio: [],
    Office: [],
    Other: []
  };

  currentFiltered.forEach(item => {
    const assigned = normalizeAssigned(item.assigned_to);

    if(assigned.includes("Rony")) groups.Rony.push(item);
    else if(assigned.includes("Julio")) groups.Julio.push(item);
    else if(assigned.includes("Office")) groups.Office.push(item);
    else groups.Other.push(item);
  });

  productContent.innerHTML = "";

  Object.entries(groups).forEach(([groupName, items]) => {
    if(!items.length) return;

    const byCategory = {};

    items.forEach(item => {
      const cat = cleanCategory(item.category);
      if(!byCategory[cat]) byCategory[cat] = [];
      byCategory[cat].push(item);
    });

    const groupClass = groupName.toLowerCase();

    let sectionHtml = `
      <section class="assigned-section">
        <div class="assigned-header ${groupClass}">
          <div>
            <div class="assigned-title">${escapeHtml(groupName)}</div>
            <div class="assigned-sub">${items.length} total product(s)</div>
          </div>
        </div>
    `;

    Object.entries(byCategory).sort().forEach(([category, products]) => {
      sectionHtml += `
        <div class="category-section">
          <div class="category-header">
            <div class="category-title">${escapeHtml(category)}</div>
            <div class="category-sub">${products.length} product(s)</div>
          </div>

          <div class="product-grid">
            ${products.map(renderProductCard).join("")}
          </div>
        </div>
      `;
    });

    sectionHtml += `</section>`;

    productContent.innerHTML += sectionHtml;
  });
}

function renderProductCard(item){
  const vendors = getVendorsForProduct(item.product_name);
  const assigned = normalizeAssigned(item.assigned_to).join(", ") || "Not Assigned";
  const duplicateCount = Number(item.duplicate_count || 1);

  return `
    <div class="card" id="card-${item.id}">
      <div class="product-top">
        <img
          class="product-img"
          src="${resolveImage(item.image_url, item.product_name)}"
          alt="${escapeHtml(item.product_name || "Product Image")}"
          onerror="handleImageError(this, '${escapeJs(item.product_name || "")}')"
        >

        <div>
          <div class="product-title">${escapeHtml(item.product_name || "")}</div>
          <span class="assigned-badge">${escapeHtml(assigned)}</span>

          ${
            duplicateCount > 1
            ? `<span class="duplicate-badge">${duplicateCount} merged</span>`
            : ``
          }
        </div>
      </div>

      <div class="card-fields">
        <div>
          <div class="field-label">Category</div>

          <select class="category-select" onchange="scheduleSave('${item.id}')">
            ${categoryList.map(c => `
              <option value="${escapeHtml(c)}" ${cleanCategory(item.category) === c ? "selected" : ""}>
                ${escapeHtml(c)}
              </option>
            `).join("")}
          </select>
        </div>

        <div>
          <div class="field-label">PAR</div>

          <input
            class="par-input"
            type="number"
            min="0"
            step="0.01"
            value="${item.par ?? ""}"
            oninput="scheduleSave('${item.id}')"
          >
        </div>
      </div>

      <div class="vendor-ref">
        <strong>Vendors Previously Used:</strong><br>
        ${vendors.length ? escapeHtml(vendors.join(", ")) : "No vendor purchase history"}
      </div>

      <div class="row-status" id="status-${item.id}">Ready</div>
    </div>
  `;
}

function scheduleSave(id){
  clearTimeout(saveTimers[id]);

  setCardStatus(id, "saving", "Editing...");

  saveTimers[id] = setTimeout(() => {
    autoSave(id);
  }, 700);
}

async function autoSave(id){
  const card = document.getElementById(`card-${id}`);
  if(!card) return;

  const categoryValue = card.querySelector(".category-select").value;
  const parRaw = card.querySelector(".par-input").value;
  const parValue = parRaw === "" ? null : Number(parRaw);

  setCardStatus(id, "saving", "Saving...");

  const { error } = await supabaseClient
    .from(INVENTORY_TABLE)
    .update({
      category: categoryValue,
      par: parValue
    })
    .eq("id", id);

  if(error){
    console.error(error);

    setCardStatus(id, "error", "Error");
    setSystemStatus("Autosave Error", "error");

    return;
  }

  const product = allProducts.find(x => String(x.id) === String(id));

  if(product){
    product.category = categoryValue;
    product.par = parValue;
  }

  const rawProduct = rawProducts.find(x => String(x.id) === String(id));

  if(rawProduct){
    rawProduct.category = categoryValue;
    rawProduct.par = parValue;
  }

  categoryList = [
    ...new Set(allProducts.map(x => cleanCategory(x.category)))
  ].sort();

  setCardStatus(id, "saved", "Saved");
  setSystemStatus("Saved Automatically", "saved");

  setTimeout(() => {
    buildFilters();
    renderProducts();
    setSystemStatus("System Ready", "ready");
  }, 900);
}

function exportCSV(){
  const rows = [[
    "Product Name",
    "Assigned To",
    "Category",
    "PAR",
    "Vendor Purchase Reference",
    "Image URL",
    "Duplicate Count",
    "Merged Names"
  ]];

  currentFiltered.forEach(item => {
    rows.push([
      item.product_name || "",
      normalizeAssigned(item.assigned_to).join(" | "),
      cleanCategory(item.category),
      item.par ?? "",
      getVendorsForProduct(item.product_name).join(" | "),
      item.image_url || "",
      item.duplicate_count || 1,
      (item.duplicate_names || []).join(" | ")
    ]);
  });

  const csv = rows.map(row =>
    row.map(value =>
      `"${String(value).replaceAll('"','""')}"`
    ).join(",")
  ).join("\n");

  const blob = new Blob([csv], {
    type:"text/csv;charset=utf-8;"
  });

  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");

  a.href = url;
  a.download =
    `Inventory2026_PAR_Management_${new Date().toISOString().slice(0,10)}.csv`;

  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function mergeDuplicateProducts(products){
  const grouped = new Map();

  products.forEach(product => {
    const key = normalizeProductName(product.product_name);

    if(!key) return;

    if(!grouped.has(key)){
      grouped.set(key, []);
    }

    grouped.get(key).push(product);
  });

  const finalProducts = [];

  grouped.forEach(group => {
    if(group.length === 1){
      finalProducts.push({
        ...group[0],
        duplicate_count: 1,
        duplicate_names: [group[0].product_name].filter(Boolean)
      });
      return;
    }

    let best = group[0];

    group.forEach(candidate => {
      if(calculateProductScore(candidate) > calculateProductScore(best)){
        best = candidate;
      }
    });

    const merged = {
      ...best,
      duplicate_count: group.length,
      duplicate_names: group.map(x => x.product_name).filter(Boolean)
    };

    if(!merged.image_url){
      const withImage = group.find(x => x.image_url);
      if(withImage) merged.image_url = withImage.image_url;
    }

    if(merged.par === null || merged.par === undefined || merged.par === ""){
      const withPar = group.find(x =>
        x.par !== null &&
        x.par !== undefined &&
        x.par !== ""
      );

      if(withPar) merged.par = withPar.par;
    }

    if(!merged.category){
      const withCategory = group.find(x => x.category);
      if(withCategory) merged.category = withCategory.category;
    }

    if(!merged.assigned_to){
      const withAssigned = group.find(x => x.assigned_to);
      if(withAssigned) merged.assigned_to = withAssigned.assigned_to;
    }

    finalProducts.push(merged);
  });

  return finalProducts.sort((a,b) =>
    String(a.product_name || "").localeCompare(String(b.product_name || ""))
  );
}

function calculateProductScore(product){
  let score = 0;

  if(product.image_url) score += 80;
  if(product.par !== null && product.par !== undefined && product.par !== "") score += 70;
  if(product.category) score += 50;
  if(product.assigned_to) score += 40;

  const name = String(product.product_name || "");

  score += Math.min(name.length, 80);

  if(/\d/.test(name)) score += 10;
  if(name.length > 4) score += 10;

  return score;
}

function normalizeProductName(name){
  let value = String(name || "")
    .toLowerCase()
    .trim();

  value = value
    .replace(/&/g, " and ")
    .replace(/\+/g, " plus ");

  value = value
    .replace(/\bounces\b/g, "oz")
    .replace(/\bounce\b/g, "oz")
    .replace(/\bozs\b/g, "oz")
    .replace(/\boz\.\b/g, "oz")
    .replace(/\bfl oz\b/g, "oz")
    .replace(/\bfluid ounce\b/g, "oz")
    .replace(/\bfluid ounces\b/g, "oz");

  value = value
    .replace(/\b(\d+)\s*oz\b/g, "$1oz")
    .replace(/\b(\d+)\s*lb\b/g, "$1lb")
    .replace(/\b(\d+)\s*lbs\b/g, "$1lb")
    .replace(/\b(\d+)\s*inch\b/g, "$1in")
    .replace(/\b(\d+)\s*inches\b/g, "$1in");

  value = value
    .replace(/\bheavy duty\b/g, "heavyduty")
    .replace(/\bheavy-duty\b/g, "heavyduty")
    .replace(/\btake out\b/g, "takeout")
    .replace(/\btake-out\b/g, "takeout")
    .replace(/\bto go\b/g, "togo")
    .replace(/\bto-go\b/g, "togo");

  value = value
    .replace(/\bdeli\b/g, "")
    .replace(/\bcontainer\b/g, "")
    .replace(/\bcontainers\b/g, "")
    .replace(/\blid\b/g, "")
    .replace(/\blids\b/g, "")
    .replace(/\bbox\b/g, "")
    .replace(/\bboxes\b/g, "")
    .replace(/\bcase\b/g, "")
    .replace(/\bpack\b/g, "")
    .replace(/\bpk\b/g, "")
    .replace(/\bct\b/g, "")
    .replace(/\bcount\b/g, "")
    .replace(/\bpcs\b/g, "")
    .replace(/\bpieces\b/g, "")
    .replace(/\bwhite\b/g, "")
    .replace(/\bblack\b/g, "")
    .replace(/\bclear\b/g, "")
    .replace(/\bsmall\b/g, "")
    .replace(/\bmedium\b/g, "")
    .replace(/\blarge\b/g, "")
    .replace(/\bxlarge\b/g, "")
    .replace(/\bxl\b/g, "");

  value = value
    .replace(/[^a-z0-9]/g, "")
    .trim();

  return value;
}

function getVendorsForProduct(productName){
  const key = normalizeProductName(productName);

  if(vendorMap.has(key)){
    return [...vendorMap.get(key)].sort();
  }

  return [];
}

function normalizeAssigned(value){
  if(Array.isArray(value)){
    return value.map(v => String(v).trim()).filter(Boolean);
  }

  if(!value){
    return [];
  }

  return String(value)
    .split(",")
    .map(v => v.trim())
    .filter(Boolean);
}

function cleanCategory(value){
  const category = String(value || "").trim();
  return category || "Other";
}

function resolveImage(value, productName){
  if(value){
    const s = String(value).trim();

    if(s.startsWith("http")){
      return s;
    }

    return GITHUB_BASE + s;
  }

  const filename = String(productName || "")
    .toLowerCase()
    .replace(/[^a-z0-9]+/g,"")
    .trim();

  if(filename){
    return GITHUB_BASE + filename + ".jpg";
  }

  return "https://placehold.co/120x120?text=No+Image";
}

function handleImageError(img, productName){
  if(img.dataset.triedPng !== "1"){
    img.dataset.triedPng = "1";

    const filename = String(productName || "")
      .toLowerCase()
      .replace(/[^a-z0-9]+/g,"")
      .trim();

    img.src = GITHUB_BASE + filename + ".png";
    return;
  }

  if(img.dataset.triedJpeg !== "1"){
    img.dataset.triedJpeg = "1";

    const filename = String(productName || "")
      .toLowerCase()
      .replace(/[^a-z0-9]+/g,"")
      .trim();

    img.src = GITHUB_BASE + filename + ".jpeg";
    return;
  }

  img.src = "https://placehold.co/120x120?text=No+Image";
}

function setCardStatus(id,state,text){
  const card = document.getElementById(`card-${id}`);
  const status = document.getElementById(`status-${id}`);

  if(!card || !status) return;

  card.classList.remove("saving","saved","error");
  card.classList.add(state);

  status.textContent = text;
}

function setSystemStatus(text,state){
  systemStatus.textContent = text;

  if(state === "error"){
    systemStatus.style.background = "#fee2e2";
    systemStatus.style.color = "#991b1b";
  }
  else if(state === "saved"){
    systemStatus.style.background = "#dcfce7";
    systemStatus.style.color = "#166534";
  }
  else if(state === "loading"){
    systemStatus.style.background = "#fff7cc";
    systemStatus.style.color = "#854d0e";
  }
  else{
    systemStatus.style.background = "#f8fafc";
    systemStatus.style.color = "#334155";
  }
}

function escapeHtml(value){
  return String(value)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function escapeJs(value){
  return String(value || "")
    .replaceAll("\\","\\\\")
    .replaceAll("'","\\'")
    .replaceAll('"','\\"')
    .replaceAll("\n"," ");
}
