<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Inventory2026 | PAR Management</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --bg:#f4f7f9;
  --card:#ffffff;
  --border:#d9dee7;
  --text:#111827;
  --muted:#64748b;
  --dark:#0c1e35;
  --blue:#1e5799;
  --accent:#2dd4bf;
  --saving:#fff7cc;
  --saved:#dcfce7;
  --error:#fee2e2;
  --shadow:0 14px 35px rgba(15,23,42,.08);
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:Arial,Helvetica,sans-serif;
  background:var(--bg);
  color:var(--text);
}

.app{padding:20px}

.header{
  background:white;
  border:1px solid var(--border);
  border-bottom:4px solid var(--accent);
  border-radius:18px;
  box-shadow:var(--shadow);
  padding:22px 26px;
  margin-bottom:18px;
}

.header-main{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:20px;
  flex-wrap:wrap;
}

.brand{
  display:flex;
  align-items:center;
  gap:18px;
}

.logo{
  width:120px;
  height:82px;
  object-fit:contain;
}

h1{
  font-size:28px;
  color:var(--dark);
  margin-bottom:6px;
}

.subtitle{
  font-size:13px;
  color:var(--muted);
  font-weight:700;
}

.status-pill{
  padding:10px 18px;
  border-radius:999px;
  border:1px solid var(--border);
  font-size:13px;
  font-weight:800;
  background:#f8fafc;
}

.toolbar{
  margin-top:22px;
  display:grid;
  grid-template-columns:1.4fr 1fr 1fr 1fr auto auto;
  gap:12px;
}

input,select{
  width:100%;
  padding:12px 14px;
  border:1px solid var(--border);
  border-radius:10px;
  background:white;
  font-size:14px;
}

button{
  border:0;
  border-radius:10px;
  padding:12px 18px;
  font-weight:800;
  cursor:pointer;
  color:white;
  background:var(--dark);
}

button.blue{background:var(--blue)}

.summary{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
  margin-bottom:18px;
}

.summary-card{
  background:white;
  border:1px solid var(--border);
  border-radius:14px;
  box-shadow:var(--shadow);
  padding:18px;
}

.summary-card label{
  display:block;
  font-size:11px;
  color:var(--muted);
  text-transform:uppercase;
  font-weight:900;
  margin-bottom:6px;
}

.summary-card strong{
  font-size:24px;
  color:var(--dark);
}

.layout{
  display:grid;
  grid-template-columns:280px 1fr;
  gap:18px;
}

.sidebar{
  background:white;
  border:1px solid var(--border);
  border-radius:18px;
  box-shadow:var(--shadow);
  overflow:hidden;
  height:calc(100vh - 245px);
  position:sticky;
  top:20px;
}

.sidebar-title{
  padding:16px;
  background:var(--dark);
  color:white;
  font-weight:900;
  font-size:13px;
  text-transform:uppercase;
  letter-spacing:.06em;
}

.category-list{
  overflow:auto;
  height:calc(100% - 50px);
}

.category-btn{
  width:100%;
  background:white;
  color:#111827;
  border:0;
  border-bottom:1px solid var(--border);
  border-radius:0;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 16px;
  font-size:13px;
  text-align:left;
}

.category-btn:hover,
.category-btn.active{
  background:#eaf4ff;
  color:var(--blue);
}

.category-count{
  background:#e2e8f0;
  border-radius:999px;
  padding:4px 9px;
  font-size:11px;
  font-weight:900;
}

.content{
  min-width:0;
}

.group-section{
  background:white;
  border:1px solid var(--border);
  border-radius:18px;
  box-shadow:var(--shadow);
  margin-bottom:18px;
  overflow:hidden;
}

.group-header{
  padding:16px 18px;
  background:#f8fafc;
  border-bottom:1px solid var(--border);
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.group-title{
  font-size:18px;
  font-weight:900;
  color:var(--dark);
}

.group-sub{
  color:var(--muted);
  font-size:12px;
  font-weight:800;
}

.product-grid{
  padding:16px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(310px,1fr));
  gap:14px;
}

.card{
  border:1px solid var(--border);
  border-radius:16px;
  background:white;
  padding:14px;
  transition:.2s;
}

.card.saving{background:var(--saving)}
.card.saved{background:var(--saved)}
.card.error{background:var(--error)}

.product-top{
  display:grid;
  grid-template-columns:92px 1fr;
  gap:14px;
  align-items:center;
  margin-bottom:14px;
}

.product-img{
  width:92px;
  height:92px;
  object-fit:contain;
  border:1px solid var(--border);
  border-radius:14px;
  padding:6px;
  background:white;
}

.product-title{
  font-size:15px;
  font-weight:900;
  line-height:1.3;
}

.assigned-badge{
  display:inline-block;
  margin-top:7px;
  padding:4px 8px;
  border-radius:999px;
  background:#e0f2fe;
  color:#075985;
  font-size:11px;
  font-weight:900;
}

.card-fields{
  display:grid;
  grid-template-columns:1fr 110px;
  gap:10px;
  margin-bottom:12px;
}

.field-label{
  font-size:10px;
  font-weight:900;
  color:var(--muted);
  text-transform:uppercase;
  margin-bottom:4px;
}

.par-input{
  text-align:center;
  font-weight:900;
}

.vendor-ref{
  border-top:1px solid var(--border);
  padding-top:10px;
  font-size:12px;
  color:#334155;
  font-weight:700;
  line-height:1.45;
}

.row-status{
  margin-top:10px;
  font-size:12px;
  font-weight:900;
  color:#475569;
}

.empty{
  background:white;
  border:1px solid var(--border);
  border-radius:18px;
  padding:40px;
  text-align:center;
  color:var(--muted);
  font-weight:900;
}

@media(max-width:1000px){
  .toolbar{grid-template-columns:1fr}
  .summary{grid-template-columns:1fr}
  .layout{grid-template-columns:1fr}
  .sidebar{height:auto;position:relative}
}
</style>
</head>

<body>
<div class="app">

<header class="header">
  <div class="header-main">
    <div class="brand">
      <img class="logo" src="https://raw.githubusercontent.com/pgonzalez2910/jengchi-product-images/main/jengchilogo.jpg" alt="Jeng Chi Logo">
      <div>
        <h1>Inventory2026 — PAR Management</h1>
        <div class="subtitle">Organized by Rony, Julio, Office, and Category · Autosave · CSV Export · Vendor Reference</div>
      </div>
    </div>
    <div class="status-pill" id="systemStatus">System Ready</div>
  </div>

  <div class="toolbar">
    <input id="searchInput" placeholder="Search product..." />
    <select id="assignedFilter">
      <option value="">All Assigned</option>
      <option value="Rony">Rony</option>
      <option value="Julio">Julio</option>
      <option value="Office">Office</option>
    </select>
    <select id="categoryFilter"><option value="">All Categories</option></select>
    <select id="vendorFilter"><option value="">All Vendors</option></select>
    <button onclick="loadProducts()">Refresh</button>
    <button class="blue" onclick="exportCSV()">Export CSV</button>
  </div>
</header>

<section class="summary">
  <div class="summary-card"><label>Total Products</label><strong id="totalProducts">0</strong></div>
  <div class="summary-card"><label>Categories</label><strong id="totalCategories">0</strong></div>
  <div class="summary-card"><label>Vendors</label><strong id="totalVendors">0</strong></div>
  <div class="summary-card"><label>Missing Photos</label><strong id="missingPhotos">0</strong></div>
</section>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-title">Categories</div>
    <div class="category-list" id="categoryList"></div>
  </aside>

  <main class="content" id="productContent">
    <div class="empty">Loading PAR Management...</div>
  </main>
</div>

</div>

<script>
const SUPABASE_URL = "https://kpldzwlftkvjjntgsqxx.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtwbGR6d2xmdGt2ampudGdzcXh4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDY2MzE5NzAsImV4cCI6MjA2MjIwNzk3MH0.qnWbOQv2RLPsIyO-oRwQkAN2VhmmdhTBt46SweUsLbs";

const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const INVENTORY_TABLE = "inventory_management";
const INVOICE_ITEMS_TABLE = "invoice_items";
const INVOICES_TABLE = "invoices";
const GITHUB_BASE = "https://raw.githubusercontent.com/pgonzalez2910/jengchi-product-images/main/";

let allProducts = [];
let currentFiltered = [];
let categoryList = [];
let vendorMap = new Map();
let saveTimers = {};
let activeCategory = "";

const productContent = document.getElementById("productContent");
const categoryListEl = document.getElementById("categoryList");
const searchInput = document.getElementById("searchInput");
const assignedFilter = document.getElementById("assignedFilter");
const categoryFilter = document.getElementById("categoryFilter");
const vendorFilter = document.getElementById("vendorFilter");
const systemStatus = document.getElementById("systemStatus");

document.addEventListener("DOMContentLoaded", () => {
  loadProducts();
  searchInput.addEventListener("input", renderProducts);
  assignedFilter.addEventListener("change", renderProducts);
  categoryFilter.addEventListener("change", () => {
    activeCategory = categoryFilter.value;
    renderProducts();
  });
  vendorFilter.addEventListener("change", renderProducts);
});

async function loadProducts(){
  setSystemStatus("Loading...", "loading");

  const { data, error } = await supabaseClient
    .from(INVENTORY_TABLE)
    .select("id, product_name, image_url, category, par, assigned_to")
    .order("product_name", { ascending:true });

  if(error){
    console.error(error);
    setSystemStatus("Load Error", "error");
    productContent.innerHTML = `<div class="empty">Error loading inventory data.</div>`;
    return;
  }

  allProducts = mergeDuplicateProducts(data || []);

  categoryList = [...new Set(allProducts.map(x => x.category || "Other"))].sort();

  await loadVendorHistory();
  buildFilters();
  renderProducts();
  setSystemStatus("System Ready", "ready");
}

async function loadVendorHistory(){
  vendorMap = new Map();

  const { data: invoiceItems, error:itemError } = await supabaseClient
    .from(INVOICE_ITEMS_TABLE)
    .select("product_name, invoice_id");

  if(itemError){
    console.warn(itemError);
    return;
  }

  const invoiceIds = [...new Set((invoiceItems || []).map(x => x.invoice_id).filter(Boolean))];

  if(!invoiceIds.length) return;

  const { data: invoices, error:invoiceError } = await supabaseClient
    .from(INVOICES_TABLE)
    .select("id, vendor")
    .in("id", invoiceIds);

  if(invoiceError){
    console.warn(invoiceError);
    return;
  }

  const invoiceVendorById = new Map();

  (invoices || []).forEach(inv => {
    if(inv.id && inv.vendor) invoiceVendorById.set(inv.id, inv.vendor);
  });

  (invoiceItems || []).forEach(item => {
    const productName = normalizeProductName(item.product_name);
    const vendor = invoiceVendorById.get(item.invoice_id);

    if(!productName || !vendor) return;

    if(!vendorMap.has(productName)) vendorMap.set(productName, new Set());
    vendorMap.get(productName).add(vendor);
  });
}

function buildFilters(){
  categoryFilter.innerHTML = `<option value="">All Categories</option>`;
  categoryList.forEach(c => {
    categoryFilter.innerHTML += `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`;
  });

  const vendors = [...new Set([...vendorMap.values()].flatMap(set => [...set]))].sort();

  vendorFilter.innerHTML = `<option value="">All Vendors</option>`;
  vendors.forEach(v => {
    vendorFilter.innerHTML += `<option value="${escapeHtml(v)}">${escapeHtml(v)}</option>`;
  });

  document.getElementById("totalCategories").textContent = categoryList.length;
  document.getElementById("totalVendors").textContent = vendors.length;
}

function renderProducts(){
  const search = searchInput.value.toLowerCase().trim();
  const assigned = assignedFilter.value;
  const selectedVendor = vendorFilter.value;

  currentFiltered = allProducts.filter(item => {
    const name = String(item.product_name || "").toLowerCase();
    const category = item.category || "Other";
    const assignedTo = normalizeAssigned(item.assigned_to);
    const vendors = getVendorsForProduct(item.product_name);

    return (!search || name.includes(search)) &&
           (!assigned || assignedTo.includes(assigned)) &&
           (!activeCategory || category === activeCategory) &&
           (!selectedVendor || vendors.includes(selectedVendor));
  });

  document.getElementById("totalProducts").textContent = currentFiltered.length;
  document.getElementById("missingPhotos").textContent = currentFiltered.filter(x => !x.image_url).length;

  renderCategorySidebar();
  renderGroupedProducts();
}

function renderCategorySidebar(){
  const counts = new Map();

  allProducts.forEach(item => {
    const assigned = assignedFilter.value;
    const assignedTo = normalizeAssigned(item.assigned_to);
    const name = String(item.product_name || "").toLowerCase();
    const search = searchInput.value.toLowerCase().trim();

    if(assigned && !assignedTo.includes(assigned)) return;
    if(search && !name.includes(search)) return;

    const cat = item.category || "Other";
    counts.set(cat, (counts.get(cat) || 0) + 1);
  });

  const total = [...counts.values()].reduce((a,b) => a + b, 0);

  categoryListEl.innerHTML = `
    <button class="category-btn ${activeCategory === "" ? "active" : ""}" onclick="selectCategory('')">
      <span>All Categories</span>
      <span class="category-count">${total}</span>
    </button>
  `;

  [...counts.entries()].sort().forEach(([cat,count]) => {
    categoryListEl.innerHTML += `
      <button class="category-btn ${activeCategory === cat ? "active" : ""}" onclick="selectCategory('${escapeJs(cat)}')">
        <span>${escapeHtml(cat)}</span>
        <span class="category-count">${count}</span>
      </button>
    `;
  });
}

function selectCategory(category){
  activeCategory = category;
  categoryFilter.value = category;
  renderProducts();
}

function renderGroupedProducts(){
  if(!currentFiltered.length){
    productContent.innerHTML = `<div class="empty">No products found.</div>`;
    return;
  }

  const groupedByAssigned = {
    "Rony": [],
    "Julio": [],
    "Office": [],
    "Other": []
  };

  currentFiltered.forEach(item => {
    const assigned = normalizeAssigned(item.assigned_to);
    if(assigned.includes("Rony")) groupedByAssigned.Rony.push(item);
    else if(assigned.includes("Julio")) groupedByAssigned.Julio.push(item);
    else if(assigned.includes("Office")) groupedByAssigned.Office.push(item);
    else groupedByAssigned.Other.push(item);
  });

  productContent.innerHTML = "";

  Object.entries(groupedByAssigned).forEach(([groupName, items]) => {
    if(!items.length) return;

    const byCategory = {};
    items.forEach(item => {
      const cat = item.category || "Other";
      if(!byCategory[cat]) byCategory[cat] = [];
      byCategory[cat].push(item);
    });

    Object.entries(byCategory).sort().forEach(([category, products]) => {
      productContent.innerHTML += `
        <section class="group-section">
          <div class="group-header">
            <div>
              <div class="group-title">${escapeHtml(groupName)} — ${escapeHtml(category)}</div>
              <div class="group-sub">${products.length} product(s)</div>
            </div>
          </div>
          <div class="product-grid">
            ${products.map(renderProductCard).join("")}
          </div>
        </section>
      `;
    });
  });
}

function renderProductCard(item){
  const vendors = getVendorsForProduct(item.product_name);
  const assigned = normalizeAssigned(item.assigned_to).join(", ") || "Not Assigned";

  return `
    <div class="card" id="card-${item.id}">
      <div class="product-top">
        <img class="product-img"
             src="${resolveImage(item.image_url, item.product_name)}"
             onerror="handleImageError(this, '${escapeJs(item.product_name || "")}')">
        <div>
          <div class="product-title">${escapeHtml(item.product_name || "")}</div>
          <span class="assigned-badge">${escapeHtml(assigned)}</span>
        </div>
      </div>

      <div class="card-fields">
        <div>
          <div class="field-label">Category</div>
          <select class="category-select" onchange="scheduleSave('${item.id}')">
            ${categoryList.map(c => `
              <option value="${escapeHtml(c)}" ${(item.category || "Other") === c ? "selected" : ""}>
                ${escapeHtml(c)}
              </option>
            `).join("")}
          </select>
        </div>

        <div>
          <div class="field-label">PAR</div>
          <input class="par-input" type="number" min="0" step="0.01"
                 value="${item.par ?? ""}" oninput="scheduleSave('${item.id}')">
        </div>
      </div>

      <div class="vendor-ref">
        <strong>Vendors Previously Used:</strong><br>
        ${vendors.length ? escapeHtml(vendors.join(", ")) : "No vendor purchase history"}
      </div>

      <div class="row-status" id="status-${item.id}">Ready</div>
    </div>
  `;
}

function scheduleSave(id){
  clearTimeout(saveTimers[id]);
  setCardStatus(id, "saving", "Editing...");
  saveTimers[id] = setTimeout(() => autoSave(id), 700);
}

async function autoSave(id){
  const card = document.getElementById(`card-${id}`);
  if(!card) return;

  const categoryValue = card.querySelector(".category-select").value;
  const parRaw = card.querySelector(".par-input").value;
  const parValue = parRaw === "" ? null : Number(parRaw);

  setCardStatus(id, "saving", "Saving...");

  const { error } = await supabaseClient
    .from(INVENTORY_TABLE)
    .update({ category: categoryValue, par: parValue })
    .eq("id", id);

  if(error){
    console.error(error);
    setCardStatus(id, "error", "Error");
    setSystemStatus("Autosave Error", "error");
    return;
  }

  const product = allProducts.find(x => String(x.id) === String(id));
  if(product){
    product.category = categoryValue;
    product.par = parValue;
  }

  categoryList = [...new Set(allProducts.map(x => x.category || "Other"))].sort();

  setCardStatus(id, "saved", "Saved");
  setSystemStatus("Saved Automatically", "saved");

  setTimeout(() => {
    renderProducts();
    setSystemStatus("System Ready", "ready");
  }, 900);
}

function exportCSV(){
  const rows = [["Product Name","Assigned To","Category","PAR","Vendor Purchase Reference","Image URL"]];

  currentFiltered.forEach(item => {
    rows.push([
      item.product_name || "",
      normalizeAssigned(item.assigned_to).join(" | "),
      item.category || "Other",
      item.par ?? "",
      getVendorsForProduct(item.product_name).join(" | "),
      item.image_url || ""
    ]);
  });

  const csv = rows.map(row =>
    row.map(value => `"${String(value).replaceAll('"','""')}"`).join(",")
  ).join("\n");

  const blob = new Blob([csv], {type:"text/csv;charset=utf-8;"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");

  a.href = url;
  a.download = `Inventory2026_PAR_Management_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function mergeDuplicateProducts(products){
  const grouped = new Map();

  products.forEach(product => {
    const key = normalizeProductName(product.product_name);
    if(!grouped.has(key)) grouped.set(key, []);
    grouped.get(key).push(product);
  });

  const finalProducts = [];

  grouped.forEach(group => {
    if(group.length === 1){
      finalProducts.push(group[0]);
      return;
    }

    let best = group[0];

    group.forEach(candidate => {
      if(calculateProductScore(candidate) > calculateProductScore(best)){
        best = candidate;
      }
    });

    finalProducts.push(best);
  });

  return finalProducts.sort((a,b) =>
    String(a.product_name || "").localeCompare(String(b.product_name || ""))
  );
}

function calculateProductScore(product){
  let score = 0;
  if(product.image_url) score += 50;
  if(product.par !== null && product.par !== undefined) score += 40;
  if(product.category) score += 20;
  if(product.assigned_to) score += 20;
  score += String(product.product_name || "").length;
  return score;
}

function normalizeProductName(name){
  return String(name || "")
    .toLowerCase()
    .replace(/\s+/g,"")
    .replace(/[^a-z0-9]/g,"")
    .replace(/ounces/g,"oz")
    .replace(/ounce/g,"oz")
    .replace(/delicontainer/g,"")
    .replace(/container/g,"")
    .replace(/white/g,"")
    .trim();
}

function normalizeAssigned(value){
  if(Array.isArray(value)) return value.map(v => String(v).trim()).filter(Boolean);
  if(!value) return [];
  return String(value).split(",").map(v => v.trim()).filter(Boolean);
}

function getVendorsForProduct(productName){
  const key = normalizeProductName(productName);
  return vendorMap.has(key) ? [...vendorMap.get(key)].sort() : [];
}

function resolveImage(value, productName){
  if(value){
    const s = String(value).trim();
    if(s.startsWith("http")) return s;
    return GITHUB_BASE + s;
  }

  const filename = String(productName || "")
    .toLowerCase()
    .replace(/[^a-z0-9]+/g,"")
    .trim();

  if(filename) return GITHUB_BASE + filename + ".jpg";

  return "https://placehold.co/120x120?text=No+Image";
}

function handleImageError(img, productName){
  if(img.dataset.triedPng !== "1"){
    img.dataset.triedPng = "1";
    const filename = String(productName || "")
      .toLowerCase()
      .replace(/[^a-z0-9]+/g,"")
      .trim();
    img.src = GITHUB_BASE + filename + ".png";
    return;
  }

  img.src = "https://placehold.co/120x120?text=No+Image";
}

function setCardStatus(id,state,text){
  const card = document.getElementById(`card-${id}`);
  const status = document.getElementById(`status-${id}`);
  if(!card || !status) return;

  card.classList.remove("saving","saved","error");
  card.classList.add(state);
  status.textContent = text;
}

function setSystemStatus(text,state){
  systemStatus.textContent = text;

  if(state === "error"){
    systemStatus.style.background = "#fee2e2";
    systemStatus.style.color = "#991b1b";
  } else if(state === "saved"){
    systemStatus.style.background = "#dcfce7";
    systemStatus.style.color = "#166534";
  } else if(state === "loading"){
    systemStatus.style.background = "#fff7cc";
    systemStatus.style.color = "#854d0e";
  } else {
    systemStatus.style.background = "#f8fafc";
    systemStatus.style.color = "#334155";
  }
}

function escapeHtml(value){
  return String(value)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function escapeJs(value){
  return String(value || "")
    .replaceAll("\\","\\\\")
    .replaceAll("'","\\'")
    .replaceAll('"','\\"')
    .replaceAll("\n"," ");
}
